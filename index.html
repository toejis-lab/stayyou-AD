  --bg:#eef1f2; --surface:#ffffff; --surface-2:#f6f8f8;
  --primary:#0f4c4a; --primary-d:#0a3634; --primary-l:#e3efee;
  --ink:#152625; --muted:#6b7d7b; --line:#e2e8e7;
  --green:#15803d; --green-bg:#e7f4ec;
  --amber:#b45309; --amber-bg:#fbf1e2;
  --red:#c2321f; --red-bg:#fbeae7;
  --gray:#94a3a1; --gray-bg:#eef1f1;
  --shadow:0 1px 2px rgba(15,45,44,.06),0 6px 20px rgba(15,45,44,.06);
  --r:16px; --r-sm:11px;
  --nav-h:64px;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0}
body{
  font-family:'Pretendard',-apple-system,BlinkMacSystemFont,system-ui,sans-serif;
  background:var(--bg); color:var(--ink);
  font-size:15px; line-height:1.5; letter-spacing:-.01em;
  -webkit-font-smoothing:antialiased;
  padding-bottom:calc(var(--nav-h) + env(safe-area-inset-bottom));
}
.num{font-variant-numeric:tabular-nums;font-feature-settings:"tnum"}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,select{font-family:inherit;font-size:16px}
h1,h2,h3,p{margin:0}
.hidden{display:none!important}

/* Header */
header{
  position:sticky;top:0;z-index:40;
  background:linear-gradient(180deg,var(--primary),var(--primary-d));
  color:#fff; padding:calc(env(safe-area-inset-top) + 14px) 18px 16px;
  box-shadow:0 2px 14px rgba(10,54,52,.18);
}
.hd-row{display:flex;align-items:center;justify-content:space-between;gap:10px}
.hd-title{display:flex;align-items:center;gap:10px}
.hd-mark{width:32px;height:32px;border-radius:9px;background:var(--logo) center/cover no-repeat;
  box-shadow:0 0 0 1px rgba(255,255,255,.12) inset}
.hd-title h1{font-size:17px;font-weight:700;letter-spacing:-.02em}
.hd-title span{display:block;font-size:11px;color:rgba(255,255,255,.72);font-weight:500;margin-top:1px}
.hd-btn{width:38px;height:38px;border-radius:11px;background:rgba(255,255,255,.14);
  display:grid;place-items:center;font-size:18px}
.hd-btn:active{background:rgba(255,255,255,.26)}
.sync-dot{display:inline-flex;align-items:center;gap:5px;font-size:11px;
  color:rgba(255,255,255,.8);background:rgba(255,255,255,.12);
  padding:4px 9px;border-radius:20px;font-weight:500;margin-top:12px}
.sync-dot i{width:7px;height:7px;border-radius:50%;background:#7ee0a1;display:inline-block}
.sync-dot.local i{background:#f6c760}

/* Layout */
main{max-width:640px;margin:0 auto;padding:16px 14px 24px}
.view{animation:fade .22s ease}
@keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

.section-label{font-size:12px;font-weight:700;color:var(--muted);letter-spacing:.02em;
  margin:22px 4px 10px;text-transform:none;display:flex;align-items:center;justify-content:space-between}
.section-label:first-child{margin-top:4px}

/* Cards */
.card{background:var(--surface);border-radius:var(--r);box-shadow:var(--shadow)}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:11px}

/* Summary cards */
.stat{padding:16px 15px;border-radius:var(--r);background:var(--surface);box-shadow:var(--shadow);position:relative;overflow:hidden}
.stat .k{font-size:12px;color:var(--muted);font-weight:600;margin-bottom:7px}
.stat .v{font-size:23px;font-weight:800;letter-spacing:-.03em;line-height:1}
.stat .v small{font-size:14px;font-weight:700;color:var(--muted);margin-left:2px}
.stat .sub{font-size:11.5px;color:var(--muted);margin-top:6px;font-weight:500}
.stat.accent{background:linear-gradient(155deg,var(--primary),var(--primary-d));color:#fff}
.stat.accent .k{color:rgba(255,255,255,.72)}
.stat.accent .sub{color:rgba(255,255,255,.7)}
.stat.warn .v{color:var(--red)}
.stat .tag{position:absolute;top:14px;right:14px;font-size:16px;opacity:.5}

/* Month switcher */
.month-nav{display:flex;align-items:center;justify-content:center;gap:6px;
  background:var(--surface);border-radius:14px;padding:6px;box-shadow:var(--shadow);margin-bottom:4px}
.month-nav button{width:40px;height:38px;border-radius:10px;font-size:20px;color:var(--primary);font-weight:600}
.month-nav button:active{background:var(--primary-l)}
.month-nav .mlabel{flex:1;text-align:center;font-size:16px;font-weight:700;letter-spacing:-.02em}
.month-nav .mlabel small{display:block;font-size:11px;color:var(--muted);font-weight:500;margin-top:1px}

/* Rows / list items */
.row{display:flex;align-items:center;gap:12px;padding:14px 15px;background:var(--surface);
  border-radius:var(--r-sm);box-shadow:var(--shadow);margin-bottom:9px;text-align:left;width:100%}
.row:active{background:var(--surface-2)}
.rowtap{flex:1;display:flex;align-items:center;gap:12px;min-width:0;text-align:left;background:none}
.rowtap:active{opacity:.7}
.qbtn{flex-shrink:0;padding:10px 15px;border-radius:11px;background:var(--primary-l);color:var(--primary);font-weight:700;font-size:13.5px}
.qbtn:active{background:var(--primary);color:#fff}
.row .avatar{width:42px;height:42px;border-radius:11px;flex-shrink:0;display:grid;place-items:center;
  font-weight:800;font-size:15px;color:#fff;letter-spacing:-.03em}
.row .body{flex:1;min-width:0}
.row .name{font-weight:700;font-size:15px;letter-spacing:-.02em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.row .meta{font-size:12.5px;color:var(--muted);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.row .right{text-align:right;flex-shrink:0}
.row .amt{font-weight:800;font-size:15px;letter-spacing:-.02em}

.badge{display:inline-flex;align-items:center;gap:4px;font-size:11.5px;font-weight:700;
  padding:3px 9px;border-radius:20px;letter-spacing:-.01em}
.badge.green{background:var(--green-bg);color:var(--green)}
.badge.amber{background:var(--amber-bg);color:var(--amber)}
.badge.red{background:var(--red-bg);color:var(--red)}
.badge.gray{background:var(--gray-bg);color:var(--muted)}
.adstart-line{color:var(--primary);font-weight:600;white-space:normal;overflow:visible}

.empty{text-align:center;padding:48px 24px;color:var(--muted)}
.empty .ic{font-size:40px;margin-bottom:12px;opacity:.7}
.empty h3{font-size:16px;color:var(--ink);margin-bottom:6px;font-weight:700}
.empty p{font-size:13.5px;line-height:1.55}

.filter-chips{display:flex;gap:8px;margin-bottom:12px;overflow-x:auto;padding:2px}
.chip{white-space:nowrap;font-size:13px;font-weight:600;padding:8px 14px;border-radius:20px;
  background:var(--surface);color:var(--muted);box-shadow:var(--shadow)}
.chip.on{background:var(--primary);color:#fff}

/* Bar chart */
.chart{background:var(--surface);border-radius:var(--r);box-shadow:var(--shadow);padding:18px 16px 12px}
.bars{display:flex;align-items:flex-end;gap:9px;height:150px;margin-top:8px}
.bar-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:6px;height:100%;justify-content:flex-end}
.bar{width:100%;max-width:34px;border-radius:6px 6px 3px 3px;background:linear-gradient(180deg,var(--primary),#1c6f6a);min-height:3px;transition:height .4s ease}
.bar-lbl{font-size:10.5px;color:var(--muted);font-weight:600}
.bar-val{font-size:9.5px;color:var(--muted);font-weight:600}

/* FAB */
.fab{position:fixed;right:calc(50% - 320px + 20px);bottom:calc(var(--nav-h) + env(safe-area-inset-bottom) + 16px);
  z-index:45;width:56px;height:56px;border-radius:18px;background:var(--primary);color:#fff;
  box-shadow:0 6px 20px rgba(15,76,74,.4);display:grid;place-items:center;font-size:28px;font-weight:300}
.fab:active{transform:scale(.94)}
@media(max-width:680px){.fab{right:20px}}

/* 부수작업 (extras) */
.cat-grid{display:grid;grid-template-columns:1fr 1fr;gap:11px;margin-top:2px}
.cat-cell{background:var(--surface);border-radius:var(--r);box-shadow:var(--shadow);padding:14px 15px}
.cat-top{display:flex;align-items:center;gap:6px;font-size:12.5px;font-weight:700;color:var(--ink)}
.cat-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.cat-amt{font-size:18px;font-weight:800;letter-spacing:-.02em;margin-top:8px}
.cat-amt small{font-size:12px;font-weight:700;color:var(--muted);margin-left:2px}
.cat-cnt{font-size:11.5px;color:var(--muted);font-weight:600;margin-top:3px}
.chip-sep{width:1px;background:var(--line);margin:3px 2px;flex-shrink:0}
.ex-list{display:flex;flex-direction:column;gap:8px;margin-top:10px}

.toast{position:fixed;bottom:calc(var(--nav-h) + env(safe-area-inset-bottom) + 20px);left:50%;

/* Lock screen */
.lock{position:fixed;inset:0;z-index:200;background:linear-gradient(165deg,var(--primary),var(--primary-d));

.lock .lk-mark{width:64px;height:64px;border-radius:18px;background:var(--logo) center/cover no-repeat;
  box-shadow:0 4px 16px rgba(0,0,0,.2);margin-bottom:20px}
.lock h2{font-size:19px;font-weight:700;letter-spacing:-.02em}

.lk-dots{display:flex;gap:15px;margin-bottom:8px;height:18px;align-items:center}
.lk-dots span{width:15px;height:15px;border-radius:50%;border:2px solid rgba(255,255,255,.5);transition:.15s}

@keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-8px)}40%,80%{transform:translateX(8px)}}

.lk-pad{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;width:100%;max-width:280px}
.lk-key{aspect-ratio:1.5;border-radius:16px;background:rgba(255,255,255,.13);font-size:24px;font-weight:600;
  color:#fff;display:grid;place-items:center;transition:.1s}
.lk-key:active{background:rgba(255,255,255,.3);transform:scale(.95)}
.lk-key.blank{background:none;pointer-events:none}

.loading{display:grid;place-items:center;padding:60px;color:var(--muted)}
.spinner{width:30px;height:30px;border:3px solid var(--line);border-top-color:var(--primary);
  border-radius:50%;animation:spin .8s linear infinite;margin-bottom:12px}
@keyframes spin{to{transform:rotate(360deg)}}
</style>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js';
import { getFirestore, collection, onSnapshot, doc, setDoc, deleteDoc }
  from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js';

/* ============================================================
   Firebase 설정 — 아래 값을 실제 프로젝트 값으로 교체하세요.
   교체 전에는 자동으로 이 기기(localStorage)에만 저장됩니다.
   ============================================================ */
const FIREBASE_CONFIG = {
  apiKey: "AIzaSyDdV_U936xeOrxSqBPmlzlgjf9zEkMt9Pk",
  authDomain: "stayu-ad-project.firebaseapp.com",
  projectId: "stayu-ad-project",
  storageBucket: "stayu-ad-project.firebasestorage.app",
  messagingSenderId: "135753173627",
  appId: "1:135753173627:web:45d211b641a9d9de35b0de",
  measurementId: "G-PN14S5CYS2"
};
const USE_FB = FIREBASE_CONFIG.apiKey && !FIREBASE_CONFIG.apiKey.startsWith('YOUR_');
const LS_KEY = 'stayu_ad_billing_v1';

/* ---------- Utilities ---------- */
const $ = s => document.querySelector(s);
const won = n => (n||0).toLocaleString('ko-KR');
/* 공급가(부가세 별도)를 받아 부가세/합계 계산 */
const VAT_RATE=0.1;
const vatOf = fee => Math.round((+fee||0)*VAT_RATE);
const withVat = fee => (+fee||0) + vatOf(fee);   // 부가세 포함 청구액(완납 기준)
const billOf = c => withVat(c && c.monthlyFee);
function formatPhone(v){
  let d=String(v||'').replace(/[^0-9]/g,'').slice(0,11);
  if(!d) return '';
  if(d.startsWith('02')){
    if(d.length<=2) return d;
    if(d.length<=5) return d.replace(/(\d{2})(\d+)/,'$1-$2');
    if(d.length<=9) return d.replace(/(\d{2})(\d{3,4})(\d+)/,'$1-$2-$3');
    return d.replace(/(\d{2})(\d{4})(\d{4})/,'$1-$2-$3');
  }
  if(d.length<=3) return d;
  if(d.length<=7) return d.replace(/(\d{3})(\d+)/,'$1-$2');
  if(d.length<=10) return d.replace(/(\d{3})(\d{3})(\d+)/,'$1-$2-$3');
  return d.replace(/(\d{3})(\d{4})(\d{4})/,'$1-$2-$3');
}
const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2,7);
const pad = n => String(n).padStart(2,'0');
const todayISO = () => { const d=new Date(); return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`; };
const nowMonth = () => { const d=new Date(); return `${d.getFullYear()}-${pad(d.getMonth()+1)}`; };
const mKey = iso => iso ? iso.slice(0,7) : nowMonth();
const mLabel = m => { const [y,mo]=m.split('-'); return `${y}년 ${+mo}월`; };
const mShort = m => { const [,mo]=m.split('-'); return `${+mo}월`; };
const addMonth = (m,delta) => { let [y,mo]=m.split('-').map(Number); mo-=1+ -delta; const d=new Date(y,mo,1); return `${d.getFullYear()}-${pad(d.getMonth()+1)}`; };
function monthsBetween(from,to){ // inclusive list of 'YYYY-MM'
  const out=[]; let cur=from;
  let guard=0;
  while(cur<=to && guard<600){ out.push(cur); cur=addMonth(cur,1); guard++; }
  return out;
}
const PALETTE=['#0f4c4a','#7a5230','#1e5f8c','#8c3a5a','#4a5c1e','#5c3a8c','#b45309','#0d7377','#8c5a1e','#3a6b8c'];
const colorFor = s => PALETTE[[...(s||'?')].reduce((a,c)=>a+c.charCodeAt(0),0)%PALETTE.length];
const initial = s => (s||'?').trim().charAt(0);

/* ---------- State ---------- */
const state = {
  clients: [], payments: [], extras: [],
  tab: 'dashboard',
  month: nowMonth(),
  clientFilter: 'active',
  payFilter: 'all',
  extraFilter: 'all',
  extraCat: 'all',
  ready: false
};
let db=null;

/* ---------- Store (Firebase or localStorage) ---------- */
const Store = {
  async init(onChange){
    if(USE_FB){
      const appFb = initializeApp(FIREBASE_CONFIG);
      db = getFirestore(appFb);
      onSnapshot(collection(db,'ad_clients'), snap=>{
        state.clients = snap.docs.map(d=>({id:d.id,...d.data()}));
        onChange();
      });
      onSnapshot(collection(db,'ad_payments'), snap=>{
        state.payments = snap.docs.map(d=>({id:d.id,...d.data()}));
        onChange();
      });
      onSnapshot(collection(db,'ad_extras'), snap=>{
        state.extras = snap.docs.map(d=>({id:d.id,...d.data()}));
        onChange();
      });
    } else {
      const raw = localStorage.getItem(LS_KEY);
      if(raw){ try{ const o=JSON.parse(raw); state.clients=o.clients||[]; state.payments=o.payments||[]; state.extras=o.extras||[]; }catch(e){} }
      onChange();
    }
  },
  _save(){ if(!USE_FB) localStorage.setItem(LS_KEY, JSON.stringify({clients:state.clients,payments:state.payments,extras:state.extras})); },
  async saveClient(c){
    if(USE_FB){ await setDoc(doc(db,'ad_clients',c.id), c); }
    else { const i=state.clients.findIndex(x=>x.id===c.id); if(i<0)state.clients.push(c); else state.clients[i]=c; this._save(); render(); }
  },
  async delClient(id){
    if(USE_FB){ await deleteDoc(doc(db,'ad_clients',id)); for(const p of state.payments.filter(p=>p.clientId===id)) await deleteDoc(doc(db,'ad_payments',p.id)); for(const e of state.extras.filter(e=>e.clientId===id)) await deleteDoc(doc(db,'ad_extras',e.id)); }
    else { state.clients=state.clients.filter(x=>x.id!==id); state.payments=state.payments.filter(p=>p.clientId!==id); state.extras=state.extras.filter(e=>e.clientId!==id); this._save(); render(); }
  },
  async savePayment(p){
    if(USE_FB){ await setDoc(doc(db,'ad_payments',p.id), p); }
    else { const i=state.payments.findIndex(x=>x.id===p.id); if(i<0)state.payments.push(p); else state.payments[i]=p; this._save(); render(); }
  },
  async delPayment(id){
    if(USE_FB){ await deleteDoc(doc(db,'ad_payments',id)); }
    else { state.payments=state.payments.filter(x=>x.id!==id); this._save(); render(); }
  },
  async saveExtra(e){
    if(USE_FB){ await setDoc(doc(db,'ad_extras',e.id), e); }
    else { const i=state.extras.findIndex(x=>x.id===e.id); if(i<0)state.extras.push(e); else state.extras[i]=e; this._save(); render(); }
  },
  async delExtra(id){
    if(USE_FB){ await deleteDoc(doc(db,'ad_extras',id)); }
    else { state.extras=state.extras.filter(x=>x.id!==id); this._save(); render(); }
  },
  importData(o){
    state.clients=o.clients||[]; state.payments=o.payments||[]; state.extras=o.extras||[];
    if(USE_FB){ for(const c of state.clients) setDoc(doc(db,'ad_clients',c.id),c); for(const p of state.payments) setDoc(doc(db,'ad_payments',p.id),p); for(const e of state.extras) setDoc(doc(db,'ad_extras',e.id),e); }
    else { this._save(); render(); }
  }
};

/* ---------- Billing logic ---------- */
function isActiveInMonth(c,m){
  const start=mKey(c.contractDate);
  if(m<start) return false;
  if(c.status==='ended' && c.endDate){ if(m>mKey(c.endDate)) return false; }
  return true;
}
function paidForClientMonth(clientId,m){
  return state.payments.filter(p=>p.clientId===clientId && p.targetMonth===m).reduce((a,p)=>a+(+p.amount||0),0);
}
// Due months for a client, from contract month up to min(now, end)
function dueMonths(c){
  const start=mKey(c.contractDate);
  let end=nowMonth();
  if(c.status==='ended' && c.endDate){ const em=mKey(c.endDate); if(em<end) end=em; }
  if(start>end) return [];
  return monthsBetween(start,end);
}
function statusOf(c,m){ // for a specific due month — 부가세 포함 기준
  const fee=withVat(c.monthlyFee);       // 완납 기준 = 부가세 포함
  const supply=+c.monthlyFee||0;         // 공급가
  const paid=paidForClientMonth(c.id,m);
  if(paid<=0) return {s:'미납',cls:'red',paid,fee,supply};
  if(paid<fee) return {s:'부분',cls:'amber',paid,fee,supply};
  return {s:'완납',cls:'green',paid,fee,supply};
}
function clientArrears(c){ // total unpaid up to now — 부가세 포함 기준
  let due=0,paid=0;
  for(const m of dueMonths(c)){ due+=withVat(c.monthlyFee); paid+=paidForClientMonth(c.id,m); }
  return Math.max(0, due-paid);
}
function monthTotals(m){
  const active=state.clients.filter(c=>isActiveInMonth(c,m));
  const supply=active.reduce((a,c)=>a+(+c.monthlyFee||0),0);   // 공급가 합계
  const vat=active.reduce((a,c)=>a+vatOf(c.monthlyFee),0);      // 부가세 합계
  const expected=supply+vat;                                   // 부가세 포함 총 청구액
  const paid=state.payments.filter(p=>p.targetMonth===m).reduce((a,p)=>a+(+p.amount||0),0);
  return {active,expected,supply,vat,paid,unpaid:Math.max(0,expected-paid)};
}
function remainingForMonth(c,m){ return Math.max(0, withVat(c.monthlyFee)-paidForClientMonth(c.id,m)); }
// 계약월~현재까지 월별 정산 현황 (최신월 우선). 각 월의 분할 입금 내역 포함
function clientMonthBoard(c){
  const bill=withVat(c.monthlyFee);
  return dueMonths(c).slice().reverse().map(m=>{
    const installments=state.payments.filter(p=>p.clientId===c.id && p.targetMonth===m)
      .sort((a,b)=>(a.payDate||'').localeCompare(b.payDate||'')||(a.createdAt||0)-(b.createdAt||0));
    const paid=installments.reduce((a,p)=>a+(+p.amount||0),0);
    const remain=Math.max(0,bill-paid);
    let cls='red',s='미납';
    if(bill>0 && paid>=bill){cls='green';s='완납';}
    else if(paid>0){cls='amber';s='부분';}
    // 중복 의심: 같은 금액이 2건 이상 입력됨
    const _cnt={}; installments.forEach(p=>{const k=+p.amount||0; if(k>0)_cnt[k]=(_cnt[k]||0)+1;});
    const dup=Object.values(_cnt).some(n=>n>=2);
    return {m,bill,paid,remain,cls,s,installments,dup};
  });
}
// 'YYYY-MM-DD' → 'M/D'
function mmdd(iso){ return iso ? `${+iso.slice(5,7)}/${+iso.slice(8,10)}` : ''; }
function adStartLabel(iso){
  if(!iso) return '광고 시작일이 등록되어 있지 않습니다';
  const [y,mo,d]=iso.split('-').map(Number);
  return `${y}년 ${mo}월 ${d}일 광고 시작`;
}
// 달력 칸용 축약 금액: 110000 → 11만, 88000 → 8.8만, 5000 → 5천
function wonShort(n){
  n=+n||0;
  if(n>=10000){ const m=n/10000; return (Number.isInteger(m)?m:+m.toFixed(1))+'만'; }
  if(n>=1000){ const k=n/1000; return (Number.isInteger(k)?k:+k.toFixed(1))+'천'; }
  return String(n);
}
// 특정 거래처+월의 입금 건들(날짜순)과 '중복 의심' 정보 — 같은 금액이 2건 이상이면 중복 의심
function monthPayList(clientId,m){
  const pays=state.payments.filter(p=>p.clientId===clientId && p.targetMonth===m)
    .sort((a,b)=>(a.payDate||'').localeCompare(b.payDate||'')||(a.createdAt||0)-(b.createdAt||0));
  const cnt={};
  pays.forEach(p=>{ const k=+p.amount||0; if(k>0) cnt[k]=(cnt[k]||0)+1; });
  const dupAmts=new Set(Object.keys(cnt).filter(k=>cnt[k]>=2).map(Number));
  return {pays, dup:dupAmts.size>0, dupAmts};
}

/* ============================================================
   부수작업(광고 외 추가작업) — 분류/부가세/집계 헬퍼
   ============================================================ */
const EXTRA_CATS = [
  {v:'사진',   emoji:'📷', color:'#1e5f8c'},
  {v:'영상',   emoji:'🎬', color:'#8c3a5a'},
  {v:'디자인', emoji:'🎨', color:'#7a5230'},
  {v:'기타',   emoji:'🧾', color:'#4a5c1e'},
];
const catMeta = v => EXTRA_CATS.find(c=>c.v===v) || {v:v||'기타', emoji:'🧾', color:'#6b7d7b'};
const extraVat  = e => (e && e.vatMode==='add') ? Math.round((+e.amount||0)*VAT_RATE) : 0;
const extraBill = e => (+((e&&e.amount)||0)) + extraVat(e);   // 부가세 포함 청구액
function extraTotals(list){
  list = list || state.extras;
  const bill = list.reduce((a,e)=>a+extraBill(e),0);
  const paid = list.filter(e=>e.status==='paid').reduce((a,e)=>a+extraBill(e),0);
  return {count:list.length, bill, paid, unpaid:Math.max(0,bill-paid)};
}
function extraByCat(list){
  list = list || state.extras;
  const map={};
  list.forEach(e=>{
    const k = catMeta(e.category).v;
    (map[k]=map[k]||{cat:k, count:0, bill:0});
    map[k].count++; map[k].bill+=extraBill(e);
  });
  return Object.values(map).sort((a,b)=>b.bill-a.bill);
}
function exFeeText(amount, vatMode){
  const v=+amount||0;
  if(!v) return '금액(공급가)을 입력하세요. ‘부가세 별도’ 선택 시 10%가 더해집니다.';
  if(vatMode==='none') return `<b style="color:var(--primary)">청구액 ${won(v)}원</b> · 부가세 없음`;
  return `부가세 ${won(Math.round(v*VAT_RATE))}원 · <b style="color:var(--primary)">청구액 ${won(v+Math.round(v*VAT_RATE))}원</b>`;
}

/* ============================================================
   정산 점검 — 이번 달 미입금 vs 누적 미수금 차이 원인 진단
   ============================================================ */
function settlementCheck(){
  const m=state.month, now=nowMonth();
  const monthAhead = m>now;   // 보고 있는 정산 기준월이 실제 현재 달보다 미래
  const flagged=[];
  for(const c of state.clients){
    if(!isActiveInMonth(c,m)) continue;
    if(statusOf(c,m).s==='완납') continue;
    const bill=withVat(c.monthlyFee);
    const thisShort=Math.max(0, bill - paidForClientMonth(c.id,m));
    if(thisShort<=0) continue;
    const arr=clientArrears(c);
    // 이번 달 부족액이 '누적 미수'보다 크다 = 이미 낸 돈이 다른 달에 잡혀 있다는 신호
    if(arr < thisShort){
      const over=dueMonths(c).map(mm=>({m:mm, excess:paidForClientMonth(c.id,mm)-bill}))
        .filter(x=>x.excess>0).sort((a,b)=>b.excess-a.excess);
      const future=state.payments.filter(p=>p.clientId===c.id && p.targetMonth && p.targetMonth>now)
        .map(p=>({id:p.id, m:p.targetMonth, amt:+p.amount||0}));
      flagged.push({c, thisShort, arr, gap:thisShort-arr, bill, over, future});
    }
  }
  flagged.sort((a,b)=>b.gap-a.gap);
  return {m, now, monthAhead, flagged, gapTotal:flagged.reduce((a,x)=>a+x.gap,0)};
}

    body+=`<div class="section-label" style="margin:6px 0 10px">대상월 확인 필요 <span>${dg.flagged.length}곳 · 합계 ${won(dg.gapTotal)}원</span></div>`;
    body+=dg.flagged.map(f=>{
      const parked = [
        ...f.over.map(o=>`${mLabel(o.m)}에 <b>초과 ${won(o.excess)}원</b>`),

      return `<div class="diag-card warn">

        <div class="diag-line"><span>이번 달(${mLabel(dg.m)}) 미입금</span><b style="color:var(--red)">${won(f.thisShort)}원</b></div>
        <div class="diag-line"><span>이 거래처 누적 미수</span><b>${won(f.arr)}원</b></div>
        <div class="diag-note">

        </div>
        <button class="diag-fix" data-action="paycalm" data-id="${f.c.id}" data-m="${f.over.length?f.over[0].m:dg.m}">📅 달력에서 이 거래처 입금 정리하기</button>
      </div>`;
    }).join('');
  } else if(!dg.monthAhead){

function viewPayments(){

  let list=active.map(c=>({c,...statusOf(c,m)}));
  if(state.payFilter==='unpaid') list=list.filter(x=>x.s!=='완납');
  else if(state.payFilter==='paid') list=list.filter(x=>x.s==='완납');
  list.sort((a,b)=>a.s==='완납'?1:b.s==='완납'?-1:0);
  const {expected,paid}=monthTotals(m);

  const counts={all:active.length, unpaid:active.filter(c=>statusOf(c,m).s!=='완납').length, paid:active.filter(c=>statusOf(c,m).s==='완납').length};

  return `<div class="view">
    <div class="month-nav">
      <button data-action="mprev">‹</button>
      <div class="mlabel">${mLabel(m)}<small>입금 ${won(paid)} / ${won(expected)}원</small></div>

function viewStats(){
  if(state.clients.length===0) return emptyState();
  // last 6 months paid totals
  const months=[]; let cur=nowMonth();
  for(let i=5;i>=0;i--) months.push(addMonth(cur,-i));
  const data=months.map(m=>({m,val:state.payments.filter(p=>p.targetMonth===m).reduce((a,p)=>a+(+p.amount||0),0)}));
  const max=Math.max(1,...data.map(d=>d.val));
  const yearTotal=state.payments.filter(p=>(p.targetMonth||'').startsWith(String(new Date().getFullYear()))).reduce((a,p)=>a+(+p.amount||0),0);
  const allTotal=state.payments.reduce((a,p)=>a+(+p.amount||0),0);

  // per client cumulative
  const perClient=state.clients.map(c=>({c,total:state.payments.filter(p=>p.clientId===c.id).reduce((a,p)=>a+(+p.amount||0),0),ar:clientArrears(c)}))
    .sort((a,b)=>b.total-a.total);

  return `<div class="view">
    <div class="grid2">
      <div class="stat accent"><div class="k">${new Date().getFullYear()}년 누적 입금</div><div class="v num">${won(yearTotal)}<small>원</small></div></div>
      <div class="stat"><div class="k">전체 누적 입금</div><div class="v num">${won(allTotal)}<small>원</small></div></div>
    </div>
    <div class="section-label">월별 입금 추이 <span>최근 6개월</span></div>
    <div class="chart">
      <div class="bars">
        ${data.map(d=>`<div class="bar-col">
          <div class="bar-val num">${d.val>0?(d.val>=10000?Math.round(d.val/10000)+'만':won(d.val)):''}</div>
          <div class="bar" style="height:${Math.max(3,d.val/max*118)}px"></div>
          <div class="bar-lbl">${mShort(d.m)}</div>
        </div>`).join('')}
      </div>
    </div>
    ${(()=>{ const et=extraTotals(); if(et.count===0) return '';
      return `<div class="section-label">부수작업 (광고 외) <span>${et.count}건</span></div>
      <div class="grid2">
        <div class="stat"><div class="k">부수작업 총 청구</div><div class="v num">${won(et.bill)}<small>원</small></div><div class="sub">입금 ${won(et.paid)} · 미수 ${won(et.unpaid)}</div></div>
        <div class="stat ${et.unpaid>0?'warn':''}"><div class="k">부수작업 미수</div><div class="v num">${won(et.unpaid)}<small>원</small></div><div class="sub">${state.extras.filter(e=>e.status!=='paid').length}건</div></div>
      </div>`;
    })()}
    <div class="section-label">거래처별 누적 입금</div>
    ${perClient.map(({c,total,ar})=>`
      <button class="row" data-action="client" data-id="${c.id}">
        <div class="avatar" style="background:${colorFor(c.name)}">${initial(c.name)}</div>
        <div class="body"><div class="name">${esc(c.name)}</div><div class="meta">${ar>0?`미수 ${won(ar)}원`:'미수 없음'}</div></div>
        <div class="right"><div class="amt num">${won(total)}</div></div>
      </button>`).join('')}
  </div>`;
}

function saveExtraForm(){
  const clientId=$('#ex-client').value;
  if(!clientId){ toast('거래처를 선택하세요'); return; }
  const amount=parseWon($('#ex-amount').value);
  if(!amount){ toast('금액을 입력하세요'); return; }
  const id=$('#ex-id').value||uid();
  const status=$('#ex-statusv').value||'unpaid';
  const createdRaw=$('#ex-created').value;
  const e={
    id, clientId,
    workDate:$('#ex-date').value||todayISO(),
    category:$('#ex-catsel').value||'기타',
    title:$('#ex-title').value.trim(),
    amount,
    vatMode:$('#ex-vatv').value||'add',
    status,
    payDate: status==='paid' ? ($('#ex-paydate')?.value||todayISO()) : '',
    method:  status==='paid' ? ($('#ex-method')?.value||'계좌이체') : '',
    memo:$('#ex-memo').value.trim(),
    createdAt: createdRaw?+createdRaw:Date.now()
  };
  // 즉시 반영 (Firebase 지연 대비)
  const i=state.extras.findIndex(x=>x.id===id); if(i<0) state.extras.push(e); else state.extras[i]=e;
  Store.saveExtra(e);
  const back=extraReturnClient; extraReturnClient=null;
  closeModal(); render(); toast(createdRaw?'저장되었습니다':'부수작업이 등록되었습니다');
  if(back){ setTimeout(()=>{ const c=state.clients.find(x=>x.id===back); if(c) showClientDetail(c); },140); }
}

// 목록에서 원터치 '입금완료' 처리 (오늘 날짜)
function markExtraPaid(id){
  const e=state.extras.find(x=>x.id===id); if(!e) return;
  const updated={...e, status:'paid', payDate:e.payDate||todayISO(), method:e.method||'계좌이체'};
  const i=state.extras.findIndex(x=>x.id===id); if(i>=0) state.extras[i]=updated;
  Store.saveExtra(updated); render(); toast('입금 처리했습니다');
}

/* ---------- Modals ---------- */
function openModal(html){
  closeModal();
  const bg=document.createElement('div'); bg.className='modal-bg'; bg.id='modalBg';
  bg.innerHTML=`<div class="modal"><div class="grabber"></div>${html}</div>`;
  bg.addEventListener('click',e=>{ if(e.target===bg) closeModal(); });
  document.body.appendChild(bg);
}
function closeModal(){ const m=$('#modalBg'); if(m) m.remove(); openDetailId=null; openCalId=null; }
let openDetailId=null; // 현재 열려있는 거래처 상세 (데이터 변경 시 자동 갱신용)
function showClientDetail(c){ if(!c) return; openModal(clientDetail(c)); openDetailId=c.id; }

/* ============================================================
   입금 달력 (펜션별 입금 처리 날짜 시각화 + 개별 수정/삭제)
   ============================================================ */
let openCalId=null;      // 현재 열려있는 입금 달력의 거래처 id
let openCalMonth=null;   // 현재 보고 있는 달력 월 'YYYY-MM'
let editReturn=null;     // 입금 수정 폼에서 돌아갈 달력 컨텍스트

function openPaymentCalendar(clientId, month){
  const c=state.clients.find(x=>x.id===clientId); if(!c) return;
  if(!month){
    const inSel=state.payments.some(p=>p.clientId===clientId && (p.payDate||'').slice(0,7)===state.month);
    if(inSel) month=state.month;
    else{
      const ds=state.payments.filter(p=>p.clientId===clientId && p.payDate).map(p=>p.payDate.slice(0,7)).sort();
      month = ds.length ? ds[ds.length-1] : (state.month||nowMonth());
    }
  }
  openModal(paymentCalendar(c, month));   // openModal이 내부에서 closeModal 호출 → 마커는 그 뒤에 설정
  openCalId=clientId; openCalMonth=month; openDetailId=null;
}

function paymentCalendar(c, month){
  const [y,mo]=month.split('-').map(Number);
  const startDow=new Date(y,mo-1,1).getDay();     // 0=일
  const daysInMonth=new Date(y,mo,0).getDate();
  const monthPays=state.payments
    .filter(p=>p.clientId===c.id && (p.payDate||'').slice(0,7)===month)
    .sort((a,b)=>(a.payDate||'').localeCompare(b.payDate||'')||(a.createdAt||0)-(b.createdAt||0));
  const byDay={};
  monthPays.forEach(p=>{ const d=+(p.payDate||'').slice(8,10); (byDay[d]=byDay[d]||[]).push(p); });
  const monthTotal=monthPays.reduce((a,p)=>a+(+p.amount||0),0);
  const todayStr=todayISO();

  let cells='';
  for(let i=0;i<startDow;i++) cells+=`<div class="cal-cell empty"></div>`;
  for(let d=1;d<=daysInMonth;d++){
    const iso=`${month}-${pad(d)}`;
    const entries=byDay[d]||[];
    const has=entries.length>0;
    const dupDay=entries.length>=2;   // 같은 날 2건 이상 → 중복 의심
    let chips='';
    entries.slice(0,2).forEach(p=>{
      chips+=`<button class="cal-amt" data-action="editpay" data-id="${p.id}">${wonShort(p.amount)}</button>`;
    });
    if(entries.length>2) chips+=`<div class="cal-more">+${entries.length-2}건</div>`;
    cells+=`<div class="cal-cell ${has?'has':''} ${dupDay?'dup':''} ${iso===todayStr?'today':''}">
      <div class="d">${d}</div>${chips}</div>`;
  }

  const listHtml = monthPays.length
    ? monthPays.map(p=>{
        const dupRow=(byDay[+(p.payDate||'').slice(8,10)]||[]).length>=2;
        return `<button class="pe-row ${dupRow?'dup':''}" data-action="editpay" data-id="${p.id}">
          <div class="pe-body">
            <div class="pe-date">${p.payDate||'-'} 입금${dupRow?`<span class="dup-tag">⚠ 같은 날 중복</span>`:''}</div>
            <div class="pe-sub">광고 ${p.targetMonth?mLabel(p.targetMonth):'-'}분${p.method?' · '+esc(p.method):''}${p.memo?' · '+esc(p.memo):''} · 눌러서 수정</div>
          </div>
          <div class="pe-amt num">${won(p.amount)}<small>원</small></div>
        </button>`;
      }).join('')
    : `<div style="text-align:center;color:var(--muted);padding:22px;font-size:13px">이 달에 입금 처리된 내역이 없습니다</div>`;

  return `
  <div class="modal-hd"><h2>${esc(c.name)} · 입금 달력</h2><button class="x" data-action="close">✕</button></div>
  <div class="modal-body">
    <div class="cal-nav">
      <button data-action="calprev">‹</button>
      <div class="cal-title">${mLabel(month)}</div>
      <button data-action="calnext">›</button>
    </div>
    <div class="cal-sum">이 달 입금 처리 <b style="color:var(--primary)">${won(monthTotal)}원</b> · ${monthPays.length}건 <span style="color:var(--muted)">(입금일 기준)</span></div>
    <div class="cal-grid" style="margin-bottom:5px">
      <div class="cal-dow sun">일</div><div class="cal-dow">월</div><div class="cal-dow">화</div><div class="cal-dow">수</div><div class="cal-dow">목</div><div class="cal-dow">금</div><div class="cal-dow sat">토</div>
    </div>
    <div class="cal-grid">${cells}</div>
    <div class="section-label" style="margin:18px 0 10px">이 달 입금 내역 <span>${monthPays.length}건</span></div>
    ${listHtml}
    <button class="btn btn-ghost" data-action="client" data-id="${c.id}" style="margin-top:6px">전체 정산 현황 보기 ›</button>
  </div>`;
}

function savePaymentEdit(pid){
  const p=state.payments.find(x=>x.id===pid); if(!p) return;
  const amount=parseWon($('#pe-amount').value);
  if(!amount){ toast('입금액을 입력하세요'); return; }
  const updated={...p,
    payDate:$('#pe-date').value||p.payDate,
    targetMonth:$('#pe-month').value||p.targetMonth,
    amount,
    method:$('#pe-methodv').value,
    memo:$('#pe-memo').value.trim()
  };
  const i=state.payments.findIndex(x=>x.id===pid); if(i>=0) state.payments[i]=updated; // 즉시 반영
  Store.savePayment(updated);
  const ret=editReturn||{id:p.clientId,month:updated.payDate.slice(0,7)};
  closeModal(); toast('수정되었습니다');
  setTimeout(()=>openPaymentCalendar(ret.id, ret.month),90);
}

function deletePaymentFromCal(pid){
  if(!confirm('이 입금 내역을 삭제할까요?')) return;
  const p=state.payments.find(x=>x.id===pid);
  const ret=editReturn||(p?{id:p.clientId,month:(p.payDate||'').slice(0,7)}:null);
  state.payments=state.payments.filter(x=>x.id!==pid); // 즉시 반영
  Store.delPayment(pid);
  closeModal(); toast('삭제되었습니다');
  if(ret) setTimeout(()=>openPaymentCalendar(ret.id, ret.month),90);
}

function paymentForm(clientId, presetMonth){
  const c=state.clients.find(x=>x.id===clientId);
  const pm = presetMonth || state.month;
  const options=state.clients.filter(x=>x.status!=='ended'||x.id===clientId)
    .sort((a,b)=>(a.name||'').localeCompare(b.name||'','ko'))
    .map(x=>`<option value="${x.id}" ${x.id===clientId?'selected':''}>${esc(x.name)}</option>`).join('');
  const initId = clientId || (state.clients.find(x=>x.status!=='ended')||{}).id || '';
  const initC = state.clients.find(x=>x.id===initId);
  const bill = initC?billOf(initC):0;
  const already = initC?paidForClientMonth(initC.id,pm):0;
  const remain = Math.max(0, bill-already);
  return `
  <div class="modal-hd"><h2>입금 등록</h2><button class="x" data-action="close">✕</button></div>
  <div class="modal-body">
    <div class="field"><label>거래처</label><select id="p-client">${options}</select></div>
    <div class="two-col">
      <div class="field"><label>입금일</label><input id="p-date" type="date" value="${todayISO()}"></div>
      <div class="field"><label>대상 월 (몇 월분)</label><input id="p-month" type="month" value="${pm}"></div>
    </div>
    <div class="field money"><label>입금액 (원)</label><input id="p-amount" inputmode="numeric" value="${remain?won(remain):''}" placeholder="0">
      <div class="quick-amt">
        <button type="button" data-qamt="full">잔액 전액</button>
        <button type="button" data-qamt="half">절반 (분할)</button>
      </div>
      <div class="hint" id="payHint"></div>
    </div>
    <div class="field"><label>입금 방법 <span style="font-weight:500">(선택)</span></label>
      <div class="seg">
        <button data-seg="method" data-v="계좌이체" class="on">계좌이체</button>
        <button data-seg="method" data-v="현금">현금</button>
        <button data-seg="method" data-v="카드">카드</button>
      </div>
    </div>
    <div class="field"><label>메모 <span style="font-weight:500">(선택)</span></label><input id="p-memo" placeholder="예: 1차 분할 입금"></div>
    <input type="hidden" id="p-methodv" value="계좌이체">
    <button class="btn btn-primary" data-action="savepay" style="margin-top:6px">입금 등록</button>
  </div>`;
}
// 입금 폼: 선택된 거래처+월 기준으로 청구/기입금/잔액 힌트 갱신 & 입금액 기본값(잔액) 세팅
function updatePayHint(setAmount){
  const cid=$('#p-client')?.value, mm=$('#p-month')?.value;
  const c=state.clients.find(x=>x.id===cid); if(!c) return;
  const bill=billOf(c), already=paidForClientMonth(c.id,mm), remain=Math.max(0,bill-already);
  if(setAmount){ const a=$('#p-amount'); if(a) a.value=remain?won(remain):''; }
  const h=$('#payHint'); if(!h) return;
  const entered=parseWon($('#p-amount')?.value||'');
  let base=`${mLabel(mm)}분 청구 ${won(bill)}원 (부가세 포함)${already>0?` · 기입금 ${won(already)}원`:''}`;
  if(remain>0) base+=` · <b style="color:var(--red)">잔액 ${won(remain)}원</b>`;
  else if(bill>0) base+=` · <b style="color:var(--green)">완납된 달입니다</b>`;
  if(entered>0 && remain>0){
    const after=remain-entered;
    if(after>0) base+=`<br><span style="color:var(--amber);font-weight:700">▸ 분할 납부 · 이 입금 후 잔액 ${won(after)}원 남음</span>`;
    else if(after===0) base+=`<br><span style="color:var(--green);font-weight:700">▸ 이 입금으로 이 달은 완납됩니다</span>`;
    else base+=`<br><span style="color:var(--muted)">▸ 잔액보다 ${won(-after)}원 많은 초과 입금입니다</span>`;
  }
  // 이 달에 이미 등록된 입금 내역 표시 + 같은 금액 중복 경고
  const {pays}=monthPayList(c.id,mm);
  if(pays.length){
    base+=`<br><span style="color:var(--muted)">▸ 이미 등록된 입금 · ${pays.map(p=>`${mmdd(p.payDate)} ${won(p.amount)}원`).join(', ')}</span>`;
    if(entered>0 && pays.some(p=>(+p.amount||0)===entered)){
      base+=`<br><span style="color:var(--red);font-weight:800">⚠ 같은 금액(${won(entered)}원)이 이 달에 이미 입금 처리돼 있습니다 — 중복 입력이 아닌지 확인하세요</span>`;
    }
  }
  h.innerHTML=base;
}

function menuSheet(){
  return `
  <div class="modal-hd"><h2>설정 · 데이터</h2><button class="x" data-action="close">✕</button></div>
  <div class="modal-body">
    <div class="card" style="padding:16px;margin-bottom:16px;background:${USE_FB?'var(--green-bg)':'var(--amber-bg)'};box-shadow:none">
      <div style="font-weight:700;margin-bottom:4px;color:${USE_FB?'var(--green)':'var(--amber)'}">${USE_FB?'☁ 클라우드 동기화 중':'📱 이 기기에만 저장 중'}</div>
      <div style="font-size:13px;color:var(--muted);line-height:1.55">${USE_FB?'Firebase에 연결되어 여러 기기에서 실시간으로 공유됩니다.':'Firebase 설정을 입력하면 여러 기기에서 함께 관리할 수 있어요. 그 전까지는 이 브라우저에만 저장됩니다.'}</div>
    </div>
    <button class="btn btn-ghost" data-action="export" style="margin-bottom:10px">📤 데이터 백업 (JSON 내보내기)</button>
    <button class="btn btn-ghost" data-action="importbtn" style="margin-bottom:10px">📥 백업 복원 (JSON 불러오기)</button>
    <input type="file" id="importFile" accept="application/json" class="hidden">
    <button class="btn btn-ghost" data-action="lock" style="margin-top:6px">🔒 이 기기 잠금 (비밀번호 다시 입력)</button>
    <div style="text-align:center;font-size:12px;color:var(--muted);margin-top:14px">거래처 ${state.clients.length}곳 · 입금 ${state.payments.length}건 · 부수작업 ${state.extras.length}건</div>
  </div>`;
}

/* ---------- helpers ---------- */
function esc(s){ return String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])); }
function parseWon(v){ return +String(v).replace(/[^0-9]/g,'')||0; }
function toast(msg,ms){ const t=document.createElement('div'); t.className='toast'; t.textContent=msg; document.body.appendChild(t); setTimeout(()=>t.remove(),ms||1900); }

// live formatting for inputs
document.addEventListener('input',e=>{
  if(e.target.matches('#f-fee,#p-amount')){
    const v=parseWon(e.target.value);
    e.target.value=v?won(v):'';
    if(e.target.id==='f-fee'){
      const pv=$('#feePreview');
      if(pv) pv.innerHTML=v?`부가세 ${won(vatOf(v))}원 · <b style="color:var(--primary)">월 청구액 ${won(withVat(v))}원</b> (완납 기준)`:'공급가를 입력하면 부가세 포함 청구액이 표시됩니다';
    }
  }
  if(e.target.id==='f-phone'){
    e.target.value=formatPhone(e.target.value);
  }
  if(e.target.id==='p-amount'){ updatePayHint(false); }
  if(e.target.id==='ex-amount'){
    const v=parseWon(e.target.value);
    e.target.value=v?won(v):'';
    const pv=$('#exFeePreview'); if(pv) pv.innerHTML=exFeeText(v, $('#ex-vatv')?.value||'add');
  }
});
// payment form: recompute hint/default when 거래처 or 대상월 changes
document.addEventListener('change',e=>{
  if(e.target.id==='p-client'||e.target.id==='p-month') updatePayHint(true);
});

/* ---------- Event delegation ---------- */
let payReturnClient=null; // 입금 후 거래처 상세로 돌아갈지
document.addEventListener('click',e=>{
  const seg=e.target.closest('[data-seg]');
  if(seg){
    const grp=seg.dataset.seg;
    seg.parentElement.querySelectorAll('button').forEach(b=>b.classList.remove('on'));
    seg.classList.add('on');
    if(grp==='status'){ $('#f-statusv').value=seg.dataset.v; $('#endWrap').classList.toggle('hidden',seg.dataset.v!=='ended'); }
    if(grp==='method'){ $('#p-methodv').value=seg.dataset.v; }
    if(grp==='emethod'){ $('#pe-methodv').value=seg.dataset.v; }
    if(grp==='exvat'){ $('#ex-vatv').value=seg.dataset.v; const pv=$('#exFeePreview'); if(pv) pv.innerHTML=exFeeText(parseWon($('#ex-amount')?.value||''), seg.dataset.v); }
    if(grp==='exstatus'){ $('#ex-statusv').value=seg.dataset.v; const w=$('#exPaidWrap'); if(w) w.classList.toggle('hidden', seg.dataset.v!=='paid'); }
    return;
  }
  const qa=e.target.closest('[data-qamt]');
  if(qa){
    const cid=$('#p-client')?.value, mm=$('#p-month')?.value;
    const c=state.clients.find(x=>x.id===cid);
    if(c){ const remain=Math.max(0, billOf(c)-paidForClientMonth(c.id,mm));
      const amt = qa.dataset.qamt==='half' ? Math.round(remain/2) : remain;
      const inp=$('#p-amount'); if(inp){ inp.value=amt?won(amt):''; updatePayHint(false); }
    }
    return;
  }
  const t=e.target.closest('[data-action]'); if(!t) return;
  const a=t.dataset.action, id=t.dataset.id;
  switch(a){
    case 'menu': openModal(menuSheet()); break;
    case 'close': closeModal(); break;
    case 'mprev': state.month=addMonth(state.month,-1); render(); break;
    case 'mnext': state.month=addMonth(state.month,1); render(); break;
    case 'pfilter': state.payFilter=t.dataset.v; render(); break;
    case 'cfilter': state.clientFilter=t.dataset.v; render(); break;
    case 'fab': if(state.tab==='payments'){ openModal(paymentForm(null)); updatePayHint(false); } else if(state.tab==='extras'){ extraReturnClient=null; openModal(extraForm(null)); } else openModal(clientForm(null)); break;
    case 'newclient': openModal(clientForm(null)); break;
    case 'client': showClientDetail(state.clients.find(c=>c.id===id)); break;
    case 'paycal': openPaymentCalendar(id, null); break;
    case 'paycalm': openPaymentCalendar(id, t.dataset.m||null); break;
    case 'settlecheck': openModal(settlementSheet()); break;
    case 'gotonow': state.month=nowMonth(); closeModal(); render(); break;
    case 'calprev': if(openCalId){ openPaymentCalendar(openCalId, addMonth(openCalMonth,-1)); } break;
    case 'calnext': if(openCalId){ openPaymentCalendar(openCalId, addMonth(openCalMonth,1)); } break;
    case 'editpay': editReturn = openCalId ? {id:openCalId, month:openCalMonth} : null; openModal(paymentEditForm(id)); break;
    case 'editback': if(editReturn){ openPaymentCalendar(editReturn.id, editReturn.month); } else closeModal(); break;
    case 'savepayedit': savePaymentEdit(id); break;
    case 'delpaycal': deletePaymentFromCal(id); break;
    case 'editclient': openModal(clientForm(state.clients.find(c=>c.id===id))); break;
    case 'pay': payReturnClient=null; openModal(paymentForm(id)); updatePayHint(false); break;
    case 'paydetail': payReturnClient=id; openModal(paymentForm(id)); updatePayHint(false); break;
    case 'paymonth': payReturnClient=id; openModal(paymentForm(id,t.dataset.m)); updatePayHint(false); break;
    case 'settleall': settleAllUnpaid(id); break;
    case 'saveclient': saveClientForm(); break;
    case 'delclient': if(confirm('이 거래처와 관련 입금내역을 모두 삭제할까요?')){ Store.delClient(id); closeModal(); toast('삭제되었습니다'); } break;
    case 'savepay': savePaymentForm(); break;
    case 'delpay': if(confirm('이 입금 내역을 삭제할까요?')){ const p=state.payments.find(x=>x.id===id); Store.delPayment(id); const c=p&&state.clients.find(x=>x.id===p.clientId); if(c){ setTimeout(()=>showClientDetail(state.clients.find(x=>x.id===c.id)),60);} else closeModal(); toast('삭제되었습니다'); } break;
    case 'export': exportData(); break;
    case 'importbtn': $('#importFile').click(); break;
    case 'lock': lockDevice(); break;
    case 'goextras': state.tab='extras'; render(); break;
    case 'exfilter': state.extraFilter=t.dataset.v; render(); break;
    case 'excat': state.extraCat=t.dataset.v; render(); break;
    case 'newextra': extraReturnClient=null; openModal(extraForm(null)); break;
    case 'newextrac': extraReturnClient=id; openModal(extraForm(null,id)); break;
    case 'extra': extraReturnClient=openDetailId||null; openModal(extraForm(state.extras.find(x=>x.id===id))); break;
    case 'extrapay': markExtraPaid(id); break;
    case 'saveextra': saveExtraForm(); break;
    case 'delextra': if(confirm('이 부수작업 내역을 삭제할까요?')){ const back=extraReturnClient; extraReturnClient=null; state.extras=state.extras.filter(x=>x.id!==id); Store.delExtra(id); closeModal(); render(); toast('삭제되었습니다'); if(back){ setTimeout(()=>{ const c=state.clients.find(x=>x.id===back); if(c) showClientDetail(c); },120); } } break;
  }
});
document.querySelectorAll('.nav-btn').forEach(b=>b.addEventListener('click',()=>{ state.tab=b.dataset.tab; state.payFilter='all'; render(); }));
document.addEventListener('change',e=>{ if(e.target.id==='importFile') importData(e.target.files[0]); });

function saveClientForm(){
  const name=$('#f-name').value.trim();
  if(!name){ toast('상호명을 입력하세요'); return; }
  const id=$('#f-id').value||uid();
  const existing=state.clients.find(c=>c.id===id);
  const c={
    id, name,
    manager:$('#f-manager').value.trim(),
    phone:$('#f-phone').value.trim(),
    contractDate:$('#f-date').value||todayISO(),
    monthlyFee:parseWon($('#f-fee').value),
    status:$('#f-statusv').value,
    endDate:$('#f-end')?.value||'',
    memo:$('#f-memo').value.trim(),
    createdAt:existing?.createdAt||Date.now()
  };
  Store.saveClient(c); closeModal(); toast(existing?'저장되었습니다':'거래처가 등록되었습니다');
}
function savePaymentForm(){
  const clientId=$('#p-client').value;
  const amount=parseWon($('#p-amount').value);
  if(!clientId){ toast('거래처를 선택하세요'); return; }
  if(!amount){ toast('입금액을 입력하세요'); return; }
  const tMonth=$('#p-month').value||state.month;
  // 같은 달에 같은 금액이 이미 등록돼 있으면 중복 여부를 한 번 더 확인
  const sameAmt=monthPayList(clientId,tMonth).pays.filter(x=>(+x.amount||0)===amount);
  if(sameAmt.length){
    const cc=state.clients.find(x=>x.id===clientId);
    if(!confirm(`${cc?cc.name+' · ':''}${mLabel(tMonth)}\n같은 금액 ${won(amount)}원이 이미 입금 처리돼 있습니다 (${sameAmt.map(x=>x.payDate).join(', ')}).\n\n중복 입력이 아닌지 확인하세요.\n그래도 등록할까요?`)) return;
  }
  const p={
    id:uid(), clientId,
    payDate:$('#p-date').value||todayISO(),
    targetMonth:tMonth,
    amount,
    method:$('#p-methodv').value,
    memo:$('#p-memo').value.trim(),
    createdAt:Date.now()
  };
  Store.savePayment(p);
  const back=payReturnClient; payReturnClient=null;
  closeModal(); toast('입금이 등록되었습니다');
  if(back){ setTimeout(()=>{ const c=state.clients.find(x=>x.id===back); if(c) showClientDetail(c); },140); }
}

// 미납/부분인 모든 달을 잔액만큼 한 번에 완납 처리 (과거 광고비 일괄 입력)
function settleAllUnpaid(clientId){
  const c=state.clients.find(x=>x.id===clientId); if(!c) return;
  const board=clientMonthBoard(c).filter(x=>x.remain>0);
  if(!board.length){ toast('미납된 달이 없습니다'); return; }
  const total=board.reduce((a,x)=>a+x.remain,0);
  const first=mLabel(board[board.length-1].m), last=mLabel(board[0].m);
  if(!confirm(`${c.name}\n${first} ~ ${last} 미납 ${board.length}개월을 오늘 날짜로 모두 완납 처리할까요?\n\n합계 ${won(total)}원 (부가세 포함)`)) return;
  const today=todayISO();
  board.forEach((x,i)=>{
    Store.savePayment({
      id:uid(), clientId,
      payDate:today, targetMonth:x.m, amount:x.remain,
      method:'계좌이체', memo:'과거분 일괄 정산',
      createdAt:Date.now()+i
    });
  });
  closeModal(); toast(`${board.length}개월 완납 처리했습니다`);
  setTimeout(()=>{ const cc=state.clients.find(x=>x.id===clientId); if(cc) showClientDetail(cc); },160);
}

function exportData(){
  const data={clients:state.clients,payments:state.payments,extras:state.extras,exportedAt:new Date().toISOString()};
  const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a'); a.href=url;
  a.download=`스테이유_광고비_백업_${todayISO()}.json`; a.click();
  URL.revokeObjectURL(url); closeModal(); toast('백업 파일을 저장했습니다');
}
function importData(file){
  if(!file) return;
  const r=new FileReader();
  r.onload=()=>{ try{ const o=JSON.parse(r.result); if(!confirm(`거래처 ${(o.clients||[]).length}곳, 입금 ${(o.payments||[]).length}건, 부수작업 ${(o.extras||[]).length}건을 불러올까요? 현재 데이터를 덮어씁니다.`)) return; Store.importData(o); closeModal(); render(); toast('복원되었습니다'); }catch(err){ toast('파일을 읽을 수 없습니다'); } };
  r.readAsText(file);
}

/* ---------- PIN Lock ---------- */
const APP_PIN='1426';
const UNLOCK_KEY='stayu_ad_unlocked';
let pinBuf='';
function isUnlocked(){ return localStorage.getItem(UNLOCK_KEY)==='1'; }
function lockDevice(){ localStorage.removeItem(UNLOCK_KEY); location.reload(); }
function showLock(){
  pinBuf='';
  const keys=['1','2','3','4','5','6','7','8','9','','0','⌫'];
  const el=document.createElement('div');
  el.className='lock'; el.id='lockScreen';
  el.innerHTML=`
    <div class="lk-mark"></div>
    <h2>광고비 관리</h2>
    <p>비밀번호를 입력하세요</p>
    <div class="lk-dots" id="lkDots">${'<span></span>'.repeat(4)}</div>
    <div class="lk-msg" id="lkMsg"></div>
    <div class="lk-pad">
      ${keys.map(k=>k===''?`<div class="lk-key blank"></div>`:`<button class="lk-key ${k==='⌫'?'act':''}" data-key="${k}">${k}</button>`).join('')}
    </div>`;
  document.body.appendChild(el);
}
function updateDots(){
  const dots=document.querySelectorAll('#lkDots span');
  dots.forEach((d,i)=>d.classList.toggle('on',i<pinBuf.length));
}
document.addEventListener('click',e=>{
  const k=e.target.closest('[data-key]'); if(!k) return;
  const v=k.dataset.key;
  const msg=$('#lkMsg'), dots=$('#lkDots');
  if(v==='⌫'){ pinBuf=pinBuf.slice(0,-1); updateDots(); return; }
  if(pinBuf.length>=4) return;
  pinBuf+=v; updateDots();
  if(pinBuf.length===4){
    if(pinBuf===APP_PIN){
      localStorage.setItem(UNLOCK_KEY,'1');
      setTimeout(()=>{ const ls=$('#lockScreen'); if(ls){ls.style.transition='opacity .3s';ls.style.opacity='0';setTimeout(()=>ls.remove(),300);} boot(); },120);
    } else {
      dots.classList.add('err'); msg.textContent='비밀번호가 맞지 않습니다';
      setTimeout(()=>{ pinBuf=''; updateDots(); dots.classList.remove('err'); msg.textContent=''; },700);
    }
  }
});
// physical keyboard support (desktop)
document.addEventListener('keydown',e=>{
  if(!$('#lockScreen')) return;
  if(/^[0-9]$/.test(e.key)){ const btn=document.querySelector(`[data-key="${e.key}"]`); if(btn) btn.click(); }
  else if(e.key==='Backspace'){ const b=document.querySelector('[data-key="⌫"]'); if(b) b.click(); }
});

/* ---------- Boot ---------- */
function boot(){ Store.init(()=>{ state.ready=true; render(); }); }
if(isUnlocked()) boot(); else showLock();
</script>
